[Mesnada.ACP]
Enabled = true
DefaultAgent = 'copilot'
AutoPermission = true

[Mesnada.ACP.Server]
Enabled = false
Transports = ['http']
Host = '0.0.0.0'
Port = 8766
MaxSessions = 100
SessionTimeout = '30m'
RequireAuth = false

[Mesnada.TUI]
Enabled = true
WebUI = false

