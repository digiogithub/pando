[LSP]
[LSP.gopls]
Disabled = false
Command = 'gopls'
Args = []

[Agents]
[Agents.coder]
Model = 'ollama.minimax-m2.5:cloud'
MaxTokens = 4096
ReasoningEffort = ''

[Skills]
Enabled = true
Paths = ['./agents/skills']

[TUI]
Theme = ''

[Mesnada]
Enabled = true

[Mesnada.Server]
Host = ''
Port = 5005

[Mesnada.Orchestrator]
StorePath = './.pando/mesnada'
LogDir = './.pando/mesnada/logs'
MaxParallel = 5
DefaultEngine = 'claude'
DefaultModel = 'sonnet'
DefaultMCPConfig = '.github/mcp-config.json'
PersonaPath = './.pando/mesnada/personas'

[Mesnada.ACP]
Enabled = true
DefaultAgent = 'copilot'
AutoPermission = true

[Mesnada.ACP.Server]
Enabled = false
Transports = ['http']
Host = '0.0.0.0'
Port = 8766
MaxSessions = 100
SessionTimeout = '30m'
RequireAuth = false

[Mesnada.TUI]
Enabled = true
WebUI = false

[Shell]
Path = ''
Args = []

[Remembrances]
Enabled = true
UseSameModel = false

# Provider options: ollama | openai | google | anthropic | openai-compatible
DocumentEmbeddingProvider = 'ollama'
DocumentEmbeddingModel = 'nomic-embed-text'
# DocumentEmbeddingBaseURL = ''   # required when provider is 'openai-compatible'
# DocumentEmbeddingAPIKey = ''    # required when provider is 'openai-compatible'

# Use a separate model optimised for code (e.g. CodeRankEmbed via Ollama)
CodeEmbeddingProvider = 'ollama'
CodeEmbeddingModel = 'hf.co/limcheekin/CodeRankEmbed-GGUF:Q4_K_M'
# CodeEmbeddingBaseURL = ''       # required when provider is 'openai-compatible'
# CodeEmbeddingAPIKey = ''        # required when provider is 'openai-compatible'

ChunkSize = 800
ChunkOverlap = 100
IndexWorkers = 4

