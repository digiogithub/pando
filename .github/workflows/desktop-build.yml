name: Desktop Build

on:
  push:
    tags:
      - 'desktop/v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            artifact: pando-desktop.app
            archive: pando-desktop-macos.tar.gz
          - os: windows-latest
            platform: windows/amd64
            artifact: pando-desktop.exe
            archive: pando-desktop-windows-amd64.zip
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: pando-desktop
            archive: pando-desktop-linux-amd64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-ui/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: cd web-ui && npm ci

      - name: Build desktop app
        run: make desktop-build

      - name: Package artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd desktop/build/bin
          tar czf ../../../${{ matrix.archive }} ${{ matrix.artifact }}

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd desktop/build/bin
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ../../../${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          tag_name: ${{ github.ref_name }}
          name: Pando Desktop ${{ github.ref_name }}
          draft: true
